name: Build & Release AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: shell/pnpm-lock.yaml

      - name: Install AppImage tooling + WebKitGTK runtime (no-CGO; webview is dlopen'd at runtime)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config file patchelf squashfs-tools \
            libgtk-3-dev libwebkit2gtk-4.0-dev libfuse2

      - name: Install linuxdeploy
        run: |
          curl -fsSL -o /usr/local/bin/linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod 755 /usr/local/bin/linuxdeploy

      - name: Install scorix CLI
        run: go install github.com/tradalab/scorix/cmd/scorix@v0.9.0

      - name: Install frontend deps
        working-directory: shell
        run: pnpm install --frozen-lockfile

      - name: Package (build → AppImage)
        run: scorix package -d . --os linux --arch amd64

      - name: Sign update artifacts (Ed25519 .sig + SHA256SUMS)
        env:
          SCORIX_UPDATE_PRIVATE_KEY: ${{ secrets.SCORIX_UPDATE_PRIVATE_KEY }}
        run: scorix appcast -d .

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.AppImage
            artifacts/*.AppImage.sig
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
