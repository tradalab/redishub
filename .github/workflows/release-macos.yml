name: Build & Release macOS App

on:
  push:
    # branches:
    #   - "feat/issue-29-macos-support"
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Export Artifacts
        run: |
          docker build \
            -f docker/Dockerfile_macos \
            --target artifacts \
            --output type=local,dest=./release \
            .

      - name: List artifacts
        run: ls -R release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
