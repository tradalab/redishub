name: Build & Release macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: shell/pnpm-lock.yaml

      - name: Install scorix CLI
        run: go install github.com/tradalab/scorix/cmd/scorix@v0.9.0

      - name: Install frontend deps
        working-directory: shell
        run: pnpm install --frozen-lockfile

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12_B64: ${{ secrets.MACOS_CERT_P12_B64 }}
          MACOS_CERT_PW: ${{ secrets.MACOS_CERT_PW }}
        run: |
          if [ -z "$MACOS_CERT_P12_B64" ]; then
            echo "No signing cert provided — package will produce an UNSIGNED .app (warning)."
            exit 0
          fi
          echo "$MACOS_CERT_P12_B64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci build.keychain
          rm -f /tmp/cert.p12

      - name: Package (universal .app → .dmg)
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: scorix package -d . --os darwin --arch universal

      - name: Sign update artifacts (Ed25519 .sig + SHA256SUMS)
        env:
          SCORIX_UPDATE_PRIVATE_KEY: ${{ secrets.SCORIX_UPDATE_PRIVATE_KEY }}
        run: scorix appcast -d .

      - name: List artifacts
        run: ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.dmg
            artifacts/*.dmg.sig
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
