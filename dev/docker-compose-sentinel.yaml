version: "3.8"

services:
  redis-master:
    image: redis:7.2
    container_name: redis-master
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis-sentinel-node.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "8001:6379"
    networks:
      - redis-net

  redis-replica:
    image: redis:7.2
    container_name: redis-replica
    command: redis-server /usr/local/etc/redis/redis.conf --replicaof redis-master 6379
    volumes:
      - ./redis-sentinel-node.conf:/usr/local/etc/redis/redis.conf
    depends_on:
      - redis-master
    ports:
      - "8002:6379"
    networks:
      - redis-net

  redis-sentinel:
    image: redis:7.2
    container_name: redis-sentinel
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf
    ports:
      - "9001:26379"
    depends_on:
      - redis-master
    networks:
      - redis-net

networks:
  redis-net:
    driver: bridge
