services:
  redisui:
    image: ghcr.io/tradalab/redishub:latest
    ports:
      - "8080:8080"
    volumes:
      - redisui_data:/root/.local/share/RedisHub
    environment:
      - SCORIX_MODE=web
      - SCORIX_WEB_HOST=0.0.0.0
      - SCORIX_WEB_PORT=8080
      # Master key that encrypts saved credentials (Redis/Sentinel passwords, SSH
      # keys & passphrases, TLS keys). Containers have no OS keychain, so you MUST
      # supply a stable base64 32-byte key. Generate ONCE and reuse it forever —
      # changing or losing it makes every stored credential unrecoverable.
      #   openssl rand -base64 32
      - SCORIX_MASTER_KEY=${SCORIX_MASTER_KEY:?set a base64 32-byte key, e.g. `openssl rand -base64 32`}
    restart: unless-stopped

volumes:
  redisui_data:
