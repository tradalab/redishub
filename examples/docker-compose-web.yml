services:
  redishub:
    # image: ghcr.io/tradalab/redishub-web:latest
    image: redishub:latest
    ports:
      - "8080:8080"
    volumes:
      - redishub_data:/root/.local/share/RedisHub
    environment:
      - SCORIX_MODE=web
      - SCORIX_WEB_HOST=0.0.0.0
      - SCORIX_WEB_PORT=8080
    restart: unless-stopped

volumes:
  redishub_data:
