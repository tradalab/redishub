services:
  redisui:
    image: ghcr.io/tradalab/redishub-web:latest
    ports:
      - "8080:8080"
    volumes:
      - redisui_data:/root/.local/share/RedisHub
    environment:
      - SCORIX_MODE=web
      - SCORIX_WEB_HOST=0.0.0.0
      - SCORIX_WEB_PORT=8080
    restart: unless-stopped

volumes:
  redisui_data:
